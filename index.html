<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Task Manager</h1>

      <div class="input-container">
        <input
          type="text"
          id="taskInput"
          placeholder="What needs to be done?"
        />

        <button onclick="addTask()">Add Task</button>
      </div>

      <div class="task-info">
        <span id="taskCounter">0 task(s), 0 completed</span>
      </div>

      <ul id="taskList"></ul>

      <p id="emptyMsg" class="empty-msg">No tasks yet. Add one above!</p>

      <div class="completed-section">
        <div class="completed-header" onclick="toggleCompleted()">
          <span>✅ Completed Tasks</span>

          <span id="completedCount">0</span>
        </div>

        <ul id="completedList"></ul>

        <button onclick="clearCompletedTasks()" class="clear-completed-btn">
          Clear Completed
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
